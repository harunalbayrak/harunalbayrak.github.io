<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harun Albayrak</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #fff;
      font-weight: 700;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      width: 240px;
      justify-content: center;
    }

    .links a:hover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      color: #fff;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">HA</div>
    <h1>Harun Albayrak</h1>
    <p class="tagline">Software Engineer</p>
    <div class="links">
      <a href="https://github.com/harunalbayrak" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/harunalbayrak" target="_blank">LinkedIn</a>
      <a href="mailto:harun@example.com">Email</a>
    </div>
    <p class="footer">&copy; 2026 Harun Albayrak</p>
  </div>
</body>
</html>
